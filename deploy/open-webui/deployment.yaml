apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: open-webui-db-app
                  key: uri
            - name: WEBUI_SECRET_KEY
              value: "open-webui-secret-key-change-in-prod"
            - name: ENABLE_SIGNUP
              value: "true"
            - name: ENABLE_COMMUNITY_SHARING
              value: "false"
            - name: ENABLE_OLLAMA_API
              value: "false"
            - name: OPENAI_API_BASE_URL
              value: "http://192.168.20.60:8642/v1"
            - name: OPENAI_API_KEY
              value: "i3SVJlg421n1F4BNwdnntAshvOplAiniiBDlanzI_tw"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-webui-data
